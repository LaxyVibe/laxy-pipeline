name: Reliability CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: functions/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
        working-directory: functions

      - name: Run backend reliability test suite
        run: python -m pytest tests/test_pipeline.py tests/test_steps.py tests/test_tools.py tests/test_contracts.py
        working-directory: functions

  frontend-tests:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: laxy-studio/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: laxy-studio

      - name: Run frontend unit tests
        run: npm test
        working-directory: laxy-studio

      - name: Build frontend
        run: npm run build
        working-directory: laxy-studio

  security-rules:
    name: Security rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: laxy-studio/package-lock.json

      - name: Set up Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: laxy-studio

      - name: Run Firestore/Storage rules tests
        run: npm run test:rules
        working-directory: laxy-studio

  audio-mvp-e2e-pr:
    name: Audio MVP E2E (PR smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: laxy-studio/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: functions/requirements.txt

      - name: Set up Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: laxy-studio

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
        working-directory: functions

      - name: Install Playwright browser
        run: npm run test:e2e:install
        working-directory: laxy-studio

      - name: Run Audio MVP API E2E tests
        run: |
          PIPELINE_AUDIO_E2E_STUB=true npx --yes firebase-tools --config firebase.json emulators:exec --project laxy-studio-dev --only auth,functions,firestore,storage "cd functions && RUN_AUDIO_MVP_E2E=1 E2E_FIREBASE_PROJECT=laxy-studio-dev python -m pytest tests_e2e/test_audio_mvp_api_e2e.py -v"

      - name: Run Audio MVP UI smoke tests
        run: |
          PIPELINE_AUDIO_E2E_STUB=true npx --yes firebase-tools --config firebase.json emulators:exec --project laxy-studio-dev --only auth,functions,firestore,storage "cd laxy-studio && E2E_FIREBASE_PROJECT=laxy-studio-dev E2E_ADMIN_EMAIL=audio-mvp-e2e-admin@example.com E2E_ADMIN_PASSWORD=Passw0rd123 E2E_ADMIN_TENANT=tenant-e2e E2E_PYTHON_CMD=python PLAYWRIGHT_BROWSERS_PATH=0 npm run test:e2e:smoke"

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            laxy-studio/playwright-report
            laxy-studio/test-results
          if-no-files-found: ignore

name: Nightly Audio MVP E2E

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  audio-mvp-e2e-nightly:
    name: Audio MVP full E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: laxy-studio/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: functions/requirements.txt

      - name: Set up Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: laxy-studio

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
        working-directory: functions

      - name: Install Playwright browser
        run: npm run test:e2e:install
        working-directory: laxy-studio

      - name: Run Audio MVP API E2E tests
        run: |
          PIPELINE_AUDIO_E2E_STUB=true npx --yes firebase-tools --config firebase.json emulators:exec --project laxy-studio-dev --only auth,functions,firestore,storage "cd functions && RUN_AUDIO_MVP_E2E=1 E2E_FIREBASE_PROJECT=laxy-studio-dev python -m pytest tests_e2e/test_audio_mvp_api_e2e.py -v"

      - name: Run Audio MVP full browser E2E
        run: |
          PIPELINE_AUDIO_E2E_STUB=true npx --yes firebase-tools --config firebase.json emulators:exec --project laxy-studio-dev --only auth,functions,firestore,storage "cd laxy-studio && E2E_FIREBASE_PROJECT=laxy-studio-dev E2E_ADMIN_EMAIL=audio-mvp-e2e-admin@example.com E2E_ADMIN_PASSWORD=Passw0rd123 E2E_ADMIN_TENANT=tenant-e2e E2E_PYTHON_CMD=python PLAYWRIGHT_BROWSERS_PATH=0 npm run test:e2e:full"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: |
            laxy-studio/playwright-report
            laxy-studio/test-results
          if-no-files-found: ignore
